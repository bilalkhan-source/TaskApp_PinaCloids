# ============================================================================
# ASE Foundations — Day 9 CI/CD Exercise
# GitHub Actions Workflow: Build, Test, and Deploy to Railway
# ============================================================================
#
# GitHub repository secrets (Settings → Secrets and variables → Actions):
#   - DOCKER_USERNAME          Docker Hub username
#   - DOCKER_PASSWORD          Docker Hub access token (rotate if ever exposed)
#   - RAILWAY_TOKEN            Railway account token (Account → Tokens)
#   - RAILWAY_PROJECT_ID       Project UUID (project settings / URL)
#   - RAILWAY_SERVICE_ID_BACKEND   Backend service → Settings → Service ID
#   - RAILWAY_SERVICE_ID_FRONTEND  Frontend service → Settings → Service ID
#   - RAILWAY_BACKEND_API_URL  Public backend API base for the browser, e.g.
#                              https://your-backend.up.railway.app/api
#                              (no trailing slash after "api")
#
# ============================================================================
name: CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test-backend:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Run tests
        run: dotnet test backend/TaskApi.sln --configuration Release

  build-and-push:
    runs-on: ubuntu-latest
    needs: test-backend
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push backend image
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/taskmanager-backend:latest ./backend
          docker push ${{ secrets.DOCKER_USERNAME }}/taskmanager-backend:latest

      - name: Build and push frontend image
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/taskmanager-frontend:latest \
            --build-arg REACT_APP_API_URL=${{ secrets.RAILWAY_BACKEND_API_URL }} \
            ./frontend
          docker push ${{ secrets.DOCKER_USERNAME }}/taskmanager-frontend:latest

  deploy:
    runs-on: ubuntu-latest
    needs: build-and-push
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Install Railway CLI
        run: npm install -g @railway/cli

      - name: Verify Railway authentication
        run: railway whoami
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}

      - name: Redeploy backend
        run: railway redeploy --service ${{ secrets.RAILWAY_SERVICE_ID_BACKEND }} --yes
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}

      - name: Redeploy frontend
        run: railway redeploy --service ${{ secrets.RAILWAY_SERVICE_ID_FRONTEND }} --yes
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
